# Faz build do Next (export estático) e publica a pasta out/ no GitHub Pages.
# Em Settings → Pages, escolhe source "GitHub Actions" (não "Deploy from a branch").
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gabriel-vidal/package-lock.json
      - name: Install and build
        working-directory: gabriel-vidal
        env:
          SITE_BASE_PATH: /site-gabriel-vidal
          STATIC_EXPORT: "1"
        run: |
          npm ci
          npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gabriel-vidal/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
